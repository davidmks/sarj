version: "2"
linters:
  default: standard
  enable:
    - gocritic
    - gosec
    - errorlint
    - revive
    - misspell
    - unconvert
    - unparam
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15
  exclusions:
    presets:
      - common-false-positives
    rules:
      # math/rand is fine for non-security name generation
      - linters: [gosec]
        text: "G404"
      # best-effort cleanup — errcheck already covers intentional ignores
      - linters: [gosec]
        text: "G104"
